<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsMap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#0d0d0d;color:#f0f0f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#app{display:none;position:fixed;inset:0}
#map{position:absolute;inset:0;bottom:70px}
#loginScreen{position:fixed;inset:0;z-index:9999;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
#loginScreen .logo{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:#4ade80;letter-spacing:-2px}
#loginScreen .logo span{color:#f0f0f0}
#loginScreen p{color:#888;font-size:14px;text-align:center;line-height:1.7}
.google-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#333;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:500;padding:12px 24px;border-radius:24px;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:box-shadow 0.2s}
.google-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.top-bar{position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(to bottom,rgba(13,13,13,0.95),transparent)}
.logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#4ade80;letter-spacing:-1px}
.logo span{color:#f0f0f0}
.status-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition:background 0.3s}
.status-dot.online{background:#4ade80;box-shadow:0 0 6px #4ade80}
.room-badge{font-family:'Space Mono',monospace;font-size:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:4px 10px;border-radius:20px;color:#aaa;cursor:pointer}
.room-badge:hover{background:rgba(255,255,255,0.13)}
.user-chip{display:flex;align-items:center;gap:6px;margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px 4px 4px}
.user-chip img{width:22px;height:22px;border-radius:50%;object-fit:cover}
.user-chip span{font-family:'Space Mono',monospace;font-size:10px;color:#ccc;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.members-bar{position:absolute;top:60px;left:0;right:0;z-index:1000;display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.member-chip{display:flex;align-items:center;gap:6px;background:rgba(13,13,13,0.88);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:5px 10px 5px 5px;white-space:nowrap;cursor:pointer;transition:border-color 0.2s}
.member-chip:hover{border-color:rgba(255,255,255,0.35)}
.member-chip.active{border-color:#4ade80}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#0d0d0d}
.member-chip .name{font-size:11px;font-family:'Space Mono',monospace}
.member-chip .time{font-size:9px;color:#666;margin-left:2px}
.bottom-panel{position:absolute;bottom:0;left:0;right:0;height:70px;z-index:2000;padding:12px 16px;background:rgba(13,13,13,0.98);display:flex;align-items:center}
.message-box{flex:1;background:rgba(30,30,30,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:16px;display:flex;align-items:center;gap:8px;padding:8px 12px}
.msg-input{flex:1;background:none;border:none;color:#f0f0f0;font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;min-width:0}
.msg-input::placeholder{color:#444}
.send-btn{background:#4ade80;border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.2s}
.send-btn:hover{background:#22c55e}
.send-btn svg{width:16px;height:16px;fill:#0d0d0d}
.msg-feed{position:absolute;left:16px;right:16px;bottom:80px;z-index:1500;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;scrollbar-width:none;pointer-events:none}
.msg-bubble{display:inline-flex;flex-direction:column;max-width:300px;background:rgba(20,20,20,0.92);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px 12px;pointer-events:auto}
.msg-bubble.me{align-self:flex-end;border-color:rgba(74,222,128,0.3)}
.msg-sender{font-family:'Space Mono',monospace;font-size:9px;margin-bottom:3px}
.msg-text{font-size:13px;line-height:1.5}
.msg-loc{font-size:9px;color:#555;margin-top:3px;font-family:'Space Mono',monospace}
.location-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:#4ade80;font-family:'Space Mono',monospace;margin-top:2px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.leaflet-popup-content-wrapper{background:#1a1a1a!important;color:#f0f0f0!important;border:1px solid rgba(255,255,255,0.15)!important;border-radius:10px!important;font-family:'Noto Sans JP',sans-serif!important;box-shadow:0 4px 20px rgba(0,0,0,0.6)!important}
.leaflet-popup-tip{background:#1a1a1a!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:12px!important;line-height:1.6!important}
.toast{position:absolute;top:100px;left:50%;transform:translateX(-50%);z-index:9000;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:#4ade80;font-family:'Space Mono',monospace;font-size:11px;padding:8px 16px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">Whats<span>Map</span></div>
  <p>グループで現在地をリアルタイム共有<br>Googleアカウントでログインしてください</p>
  <button class="google-btn" id="loginBtn">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Googleでログイン
  </button>
</div>

<div id="app">
  <div id="map"></div>
  <div class="top-bar">
    <div class="logo">Whats<span>Map</span></div>
    <div class="status-dot" id="statusDot"></div>
    <div class="room-badge" onclick="copyRoomLink()">📋 URLをコピー</div>
    <div class="user-chip">
      <img id="userPhoto" src="" alt="" style="width:22px;height:22px;border-radius:50%;object-fit:cover">
      <span id="userName"></span>
    </div>
  </div>
  <div class="members-bar" id="membersBar"></div>
  <div class="msg-feed" id="msgFeed"></div>
  <div class="bottom-panel">
    <div class="message-box">
      <input class="msg-input" id="msgInput" placeholder="メッセージを送信（位置情報を共有）" maxlength="100">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDzJOEe--Jj6Gqos4BM9JpBdczoRxzbc-0",
  authDomain: "whatsmap-f10e6.firebaseapp.com",
  databaseURL: "https://whatsmap-f10e6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "whatsmap-f10e6",
  storageBucket: "whatsmap-f10e6.firebasestorage.app",
  messagingSenderId: "749678460339",
  appId: "1:749678460339:web:ac43b3111185e4a78f5fc6"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

const COLORS=['#4ade80','#60a5fa','#f97316','#e879f9','#facc15','#fb7185','#34d399','#a78bfa'];
let currentUser = null;
let map = null;
const state = {members:{}};
const layers = {markers:{},paths:{}};
let memberColorMap = {};
let colorIndex = 0;

const getWeekKey = () => {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
};

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function getColor(id){
  if(!memberColorMap[id]) memberColorMap[id]=COLORS[colorIndex++%COLORS.length];
  return memberColorMap[id];
}

function makeIcon(color, initial, photoURL){
  if(photoURL){
    return L.divIcon({
      className:'',
      html:`<img src="${photoURL}" style="width:34px;height:34px;border-radius:50%;border:2.5px solid ${color};box-shadow:0 3px 12px rgba(0,0,0,0.6);object-fit:cover">`,
      iconSize:[34,34],iconAnchor:[17,17]
    });
  }
  return L.divIcon({
    className:'',
    html:`<div style="width:34px;height:34px;border-radius:50%;background:${color};border:2.5px solid rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#0d0d0d;font-family:'Noto Sans JP',sans-serif;box-shadow:0 3px 12px rgba(0,0,0,0.6)">${initial}</div>`,
    iconSize:[34,34],iconAnchor:[17,17]
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function updateMemberOnMap(id, name, lat, lng, message, timeStr, photoURL){
  const color = getColor(id);
  if(!state.members[id]) state.members[id]={name,color,history:[],message:'',time:timeStr,photoURL};
  const m = state.members[id];
  m.name=name; m.time=timeStr; m.photoURL=photoURL;
  if(message) m.message=message;
  const last = m.history[m.history.length-1];
  if(!last || last[0]!==lat || last[1]!==lng) m.history.push([lat,lng]);
  if(m.history.length>200) m.history.shift();

  if(layers.markers[id]) layers.markers[id].remove();
  layers.markers[id]=L.marker([lat,lng],{icon:makeIcon(color,name[0]||'?',photoURL)}).addTo(map);
  layers.markers[id].bindPopup(
    `<b style="color:${color};font-size:13px">${name}</b><br>`+
    (m.message?`<span style="color:#ccc">${m.message}</span><br>`:'')+
    `<span style="color:#555;font-size:10px;font-family:monospace">${timeStr}</span>`
  );

  if(layers.paths[id]) layers.paths[id].remove();
  if(m.history.length>1){
    layers.paths[id]=L.polyline(m.history,{color,weight:2.5,opacity:0.55,dashArray:'6 5'}).addTo(map);
  }
  renderMembersBar();
}

function renderMembersBar(){
  const bar=document.getElementById('membersBar');
  bar.innerHTML='';
  for(const[id,m] of Object.entries(state.members)){
    const chip=document.createElement('div');
    chip.className='member-chip'+(id===currentUser?.uid?' active':'');
    const avatarHtml = m.photoURL
      ? `<img style="width:24px;height:24px;border-radius:50%;object-fit:cover" src="${m.photoURL}">`
      : `<div class="avatar" style="background:${m.color}">${m.name[0]||'?'}</div>`;
    chip.innerHTML=`${avatarHtml}<span class="name">${m.name.split(' ')[0]}</span><span class="time">${m.time}</span>`;
    chip.onclick=()=>{
      const h=m.history;
      if(h.length) map.panTo(h[h.length-1],{animate:true});
      if(layers.markers[id]) layers.markers[id].openPopup();
    };
    bar.appendChild(chip);
  }
}

function addBubble(id, name, message, hasLocation, isMe){
  const color=getColor(id);
  const feed=document.getElementById('msgFeed');
  const bubble=document.createElement('div');
  bubble.className='msg-bubble'+(isMe?' me':'');
  bubble.innerHTML=
    `<div class="msg-sender" style="color:${color}">${name.split(' ')[0]}</div>`+
    `<div class="msg-text">${escHtml(message)}</div>`+
    (hasLocation?`<div class="location-pill"><div class="pulse-dot"></div>位置共有済み</div>`:'')+
    `<div class="msg-loc">${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div>`;
  feed.appendChild(bubble);
  feed.scrollTop=feed.scrollHeight;
  while(feed.children.length>30) feed.removeChild(feed.firstChild);
}

function initMap(){
  if(map) return;
  map = L.map('map',{zoomControl:false}).setView([35.6812,139.7671],14);
  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors, Tiles by HOT',maxZoom:19}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  // ログイン後にdisplay:blockになるためサイズを再計算
  setTimeout(()=>map.invalidateSize(), 100);

  const msgsRef = ref(db, `rooms/main/messages/${getWeekKey()}`);
  const seenIds = new Set();

  onValue(msgsRef, snapshot=>{
    document.getElementById('statusDot').classList.add('online');
    const data = snapshot.val();
    if(!data) return;
    Object.entries(data).forEach(([msgId, msg])=>{
      if(seenIds.has(msgId)) return;
      seenIds.add(msgId);
      const isMe = msg.userId===currentUser?.uid;
      if(msg.lat && msg.lng){
        updateMemberOnMap(msg.userId, msg.name, msg.lat, msg.lng, msg.text, msg.time||'--:--', msg.photoURL||null);
      }
      addBubble(msg.userId, msg.name, msg.text, !!(msg.lat&&msg.lng), isMe);
    });
  });
}

function sendMessage(){
  if(!currentUser) return;
  const msg=document.getElementById('msgInput').value.trim();
  if(!msg) return;
  document.getElementById('msgInput').value='';

  const now=new Date();
  const timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const msgsRef = ref(db, `rooms/main/messages/${getWeekKey()}`);

  const sendToFirebase=(lat,lng)=>{
    push(msgsRef,{
      userId: currentUser.uid,
      name: currentUser.displayName||'名無し',
      photoURL: currentUser.photoURL||null,
      text: msg,
      time: timeStr,
      timestamp: Date.now(),
      ...(lat!=null?{lat,lng}:{})
    });
    if(lat!=null && map) map.panTo([lat,lng],{animate:true});
  };

  if(!navigator.geolocation){ showToast('位置情報に対応していません'); sendToFirebase(null,null); return; }
  showToast('送信中…');
  navigator.geolocation.getCurrentPosition(
    pos=>{ showToast('送信しました'); sendToFirebase(pos.coords.latitude, pos.coords.longitude); },
    ()=>{ showToast('⚠ 位置情報を取得できませんでした'); sendToFirebase(null,null); },
    {timeout:7000,enableHighAccuracy:true}
  );
}

function copyRoomLink(){
  const url=window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast('URLをコピーしました！')).catch(()=>prompt('URLをWhatsAppで共有してください:',url));
  } else { prompt('URLをWhatsAppで共有してください:',url); }
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) {
    showToast('ログインに失敗しました');
  }
});

onAuthStateChanged(auth, user=>{
  if(user){
    currentUser = user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('userPhoto').src = user.photoURL||'';
    document.getElementById('userName').textContent = (user.displayName||'').split(' ')[0];
    initMap();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

document.getElementById('msgInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

window.sendMessage=sendMessage;
window.copyRoomLink=copyRoomLink;
</script>
</body>
</html>
